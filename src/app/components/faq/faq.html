<section>
  <div class="max-w-7xl mx-auto px-4 lg:px-8">

    <div class="relative rounded-2xl overflow-hidden min-h-[380px] md:min-h-[450px] lg:min-h-[520px]  flex items-center justify-center"
      style="background-image:url('images/faq-hero.png');background-size:cover;background-position:center;">

      <div class="relative z-10 px-6 md:px-10 lg:px-16 py-10 text-white text-center flex flex-col items-center gap-6">

        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-semibold leading-tight">
          {{ 'faq.hero.title' | translate }}
        </h1>

        <p class="text-white text-base sm:text-lg max-w-xl">
          {{ 'faq.hero.subtitle' | translate }}
        </p>

        <p class="text-white text-base sm:text-lg max-w-xl">
          {{ 'faq.hero.contact_text' | translate }}
        </p>

      </div>

    </div>

  </div>
</section>



<section class="py-16 lg:py-24 relative max-w-7xl mx-auto overflow-hidden">

  <div class="absolute inset-0 bg-[url('/images/map.png')] bg-cover bg-center bg-no-repeat opacity-30"></div>
  <div class="absolute inset-0 bg-white/80"></div>

  <div class="relative w-full px-4 text-center">

    <div class="flex items-center justify-center gap-4 lg:gap-6 mb-10 lg:mb-16">

      <div class="hidden lg:block h-[2px] w-full bg-gradient-to-r from-blue-400 to-blue-100"></div>

      <h2 class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-black whitespace-nowrap">
        {{ 'faq.section_title' | translate }}
      </h2>

      <div class="hidden lg:block h-[2px] w-full bg-gradient-to-l from-blue-400 to-blue-100"></div>

    </div>


    <!-- Tabs -->
<div class="flex flex-nowrap justify-center gap-4 sm:gap-24
overflow-x-auto whitespace-nowrap text-base sm:text-lg">

  <button
    (click)="setCategory('sender')"
    [ngClass]="activeCategory==='sender' ? 'bg-[#0D63AA] text-white' : 'text-[#0D63AA] bg-white'"
    class="px-6 sm:px-10 py-3 border-2 border-[#0D63AA] rounded-lg transition flex-shrink-0">
    {{ 'faq.tab.sender' | translate }}
  </button>

  <button
    (click)="setCategory('traveler')"
    [ngClass]="activeCategory==='traveler' ? 'bg-[#0D63AA] text-white' : 'text-[#0D63AA] bg-white'"
    class="px-6 sm:px-10 py-3 border-2 border-[#0D63AA] rounded-lg transition flex-shrink-0">
    {{ 'faq.tab.traveler' | translate }}
  </button>

  <button
    (click)="setCategory('payment')"
    [ngClass]="activeCategory==='payment' ? 'bg-[#0D63AA] text-white' : 'text-[#0D63AA] bg-white'"
    class="px-6 sm:px-10 py-3 border-2 border-[#0D63AA] rounded-lg transition flex-shrink-0">
    {{ 'faq.tab.payment' | translate }}
  </button>

</div>

  </div>

</section>



<section class="">

  <div class="max-w-5xl mx-auto px-4 space-y-4 sm:space-y-6">

    <div *ngFor="let faq of faqs; let i = index"
      class="border border-[#0D63AA] rounded-xl overflow-hidden transition">

      <button
        (click)="toggleFAQ(i)"
        class="w-full flex items-center justify-between gap-4 px-4 sm:px-6 py-4 sm:py-5 text-left font-semibold transition text-base sm:text-lg lg:text-xl"
        [ngClass]="activeIndex === i ? 'bg-[#0D63AA] text-white' : 'bg-white text-black'">

        <span class="flex-1">
          {{ faq.question | translate }}
        </span>

        <span
          class="flex items-center justify-center w-9 h-9 sm:w-10 sm:h-10 rounded-full flex-shrink-0"
          [ngClass]="activeIndex === i ? 'bg-white text-[#0D63AA]' : 'bg-[#0D63AA] text-white'">

          <i class="fa-solid"
            [ngClass]="activeIndex === i ? 'fa-minus' : 'fa-plus'"></i>

        </span>

      </button>


      <div *ngIf="activeIndex === i"
        class="px-4 sm:px-6 py-4 sm:py-5 bg-white text-black text-sm sm:text-base lg:text-lg leading-relaxed">

        <p *ngIf="faq.answer" class="mb-3">
          {{ faq.answer | translate }}
        </p>

        <p *ngIf="faq.p1" class="mb-3">
          {{ faq.p1 | translate }}
        </p>

        <ul *ngIf="faq.bullets" class="space-y-2 ml-5 list-disc">

          <li *ngFor="let bullet of faq.bullets">
            {{ bullet | translate }}
          </li>

        </ul>

        <p *ngIf="faq.p2" class="mt-3">
          {{ faq.p2 | translate }}
        </p>

      </div>

    </div>

  </div>

</section>
